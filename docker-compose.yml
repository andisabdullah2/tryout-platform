version: "3.9"

# ============================================================
# Docker Compose untuk local production testing
# Jalankan: docker compose up -d
# ============================================================

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: tryout_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tryout_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tryout_password}
      POSTGRES_DB: ${POSTGRES_DB:-tryout_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tryout_user} -d ${POSTGRES_DB:-tryout_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tryout_network

  # ---- Redis (Upstash-compatible) ----
  redis:
    image: redis:7-alpine
    container_name: tryout_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tryout_network

  # ---- Next.js App ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tryout_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tryout_user}:${POSTGRES_PASSWORD:-tryout_password}@postgres:5432/${POSTGRES_DB:-tryout_platform}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-tryout_user}:${POSTGRES_PASSWORD:-tryout_password}@postgres:5432/${POSTGRES_DB:-tryout_platform}?schema=public
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tryout_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tryout_network:
    driver: bridge
